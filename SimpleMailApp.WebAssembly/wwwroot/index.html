<head>

    <link href="css/bootstrap/bootstrap.min.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
    <link href="SimpleMailApp.WebAssembly.styles.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css"
          integrity="sha512-xh6O/CkQoPOWDdYTDqeRdPCVd1SpvCA9XXcUnZS2FmJNp1coAFzvtCN9BmamE+4aHK8yyUHUSCcJHgXloTyT2A=="

<body>
    <div id="app">Loading...</div>
    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="#" class="reload" role="button">Reload</a>
        <a class="dismiss" role="button" aria-label="Dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/Radzen.Blazor/Radzen.Blazor.js"></script>
    <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script>
    var quill;

function initQuill() {
    const editorEl = document.querySelector('#quill-editor');
    if (editorEl) {
        editorEl.innerHTML = '';
    }
    quill = new Quill('#quill-editor', {
        theme: 'snow',
        modules: {
            toolbar: [
                ['bold', 'italic', 'underline'],
                [{ 'color': [] }, { 'background': [] }],
                [{ 'font': [] }],
                [{ 'size': ['small', false, 'large', 'huge'] }],
                [{ 'align': [] }],
                ['link', 'image'],
                ['clean']
            ]
        }
    });
}

    function quillGetContent() {
        if (quill) return quill.root.innerHTML;
        return '';
    }

    function quillSetContent(html) {
        if (quill) quill.root.innerHTML = html || '';
    }

    function localStorageSaveSignature(html) {
        localStorage.setItem('emailSignature', html);
    }

    function localStorageGetSignature() {
        return localStorage.getItem('emailSignature') || '';
    }
</script>
</body>
</html>
